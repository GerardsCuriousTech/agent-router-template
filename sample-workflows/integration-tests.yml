name: Integration Tests

# TEMPLATE integration-test workflow.
#
# This is a starting point you customize for your project. As shipped it runs a
# placeholder step that writes an empty JUnit-style result file, uploads it as
# an artifact, and posts a short summary back to the PR. Replace the clearly
# marked "Run integration tests" step with your real suite (it should emit a
# JUnit XML file at integration-results.xml).
#
# Post-back behavior matches CI: build a report.md, post it to the PR as a
# github-actions[bot] comment when ENABLE_PR_COMMENTS is set (pull_request
# events only), and fall back to the run step summary otherwise. That comment
# is what wakes the agent-router daemon.

on:
  workflow_dispatch: {}
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────────────────
      # PLACEHOLDER: Run integration tests
      # ───────────────────────────────────────────────────────────────────────
      # Replace this step with your real integration suite. Requirements:
      #   - Run with `continue-on-error: true` and keep the `id: tests` so the
      #     report always reflects the real outcome (`steps.tests.outcome`).
      #   - Emit JUnit XML at `integration-results.xml` so the artifact upload
      #     and the report's test summary pick it up automatically. Most runners
      #     support this directly, for example:
      #       pytest    -> pytest --junitxml=integration-results.xml tests/integration
      #       jest      -> jest --reporters=jest-junit (set JEST_JUNIT_OUTPUT)
      #       cargo     -> cargo test ... -- -Z unstable-options --format junit
      #   - Set up any toolchain / services / credentials your tests need above
      #     this step (add `actions/setup-*`, service containers, OIDC creds).
      #
      # The placeholder below writes a valid, empty JUnit file so the template
      # is green and demonstrable out of the box. Delete it when you add real
      # tests.
      - name: Run integration tests
        id: tests
        continue-on-error: true
        run: |
          echo "PLACEHOLDER integration-tests step — replace with your suite."
          echo "Writing an empty JUnit result file so the pipeline is green."
          cat > integration-results.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites tests="0" failures="0" errors="0" skipped="0">
            <testsuite name="integration" tests="0" failures="0" errors="0" skipped="0"/>
          </testsuites>
          EOF

      # ── Build the report ───────────────────────────────────────────────────
      - name: Build report
        if: always()
        env:
          RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.tests.outcome }}
        run: |
          report=report.md
          {
            echo "## Integration Test Report"
            echo ""
            case "$OUTCOME" in
              success)  echo "Result: **passed**" ;;
              failure)  echo "Result: **failed**" ;;
              *)        echo "Result: **${OUTCOME:-not run}**" ;;
            esac
            echo ""
            echo "Commit: \`${GITHUB_SHA:0:8}\`"
            echo ""
          } > "$report"

          if [ -f integration-results.xml ]; then
            tests=$(grep -oE 'tests="[0-9]+"' integration-results.xml | head -1 | grep -oE '[0-9]+' || echo "?")
            failures=$(grep -oE 'failures="[0-9]+"' integration-results.xml | head -1 | grep -oE '[0-9]+' || echo "?")
            errors=$(grep -oE 'errors="[0-9]+"' integration-results.xml | head -1 | grep -oE '[0-9]+' || echo "0")
            skipped=$(grep -oE 'skipped="[0-9]+"' integration-results.xml | head -1 | grep -oE '[0-9]+' || echo "0")
            {
              echo "### Test results (JUnit)"
              echo ""
              echo "- ${tests} tests, ${failures} failures, ${errors} errors, ${skipped} skipped"
              echo ""
            } >> "$report"
          else
            {
              echo "_No JUnit results file (integration-results.xml) was produced._"
              echo ""
            } >> "$report"
          fi

          echo "[View run](${RUN_LINK})" >> "$report"

          echo "----- report.md -----"
          cat "$report"

      # ── Upload JUnit artifact (30-day retention) ───────────────────────────
      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-results.xml
          retention-days: 30
          if-no-files-found: ignore

      # ── Post the report back to the PR ─────────────────────────────────────
      - name: Post PR comment
        id: post_comment
        if: always() && github.event_name == 'pull_request' && vars.ENABLE_PR_COMMENTS == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file report.md

      - name: Fallback to step summary
        if: always() && steps.post_comment.outcome != 'success'
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"
